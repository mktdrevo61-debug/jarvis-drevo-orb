<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DRevo Jarvis - IA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #030305; 
            color: #00f2ff; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .drevo-watermark {
            position: absolute;
            bottom: 20px;
            right: 25px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 5px;
            color: rgba(255, 170, 0, 0.4);
            text-transform: uppercase;
            z-index: 5;
            pointer-events: none;
        }

        #ui-layer {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 10, 20, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.25);
            border-top: 1px solid rgba(0, 242, 255, 0.5);
            border-radius: 24px;
            padding: 35px 40px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(0, 242, 255, 0.05);
            width: 85%;
            max-width: 500px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .drevo-logo {
            font-size: 11px;
            letter-spacing: 4px;
            color: #ffaa00;
            text-transform: uppercase;
            margin-bottom: -5px;
            font-weight: 800;
            opacity: 0.9;
        }

        h1 { 
            margin: 5px 0 15px 0; 
            font-size: 26px; 
            letter-spacing: 3px; 
            font-weight: 300; 
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.8); 
        }
        
        h1 strong { font-weight: 700; color: #00f2ff; }

        #status { 
            letter-spacing: 2px; 
            font-weight: 700; 
            font-size: 13px; 
            color: #ffaa00; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }

        #output { 
            font-size: 18px; 
            color: #e0faff; 
            font-weight: 400; 
            min-height: 25px; 
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        #orb-visualizer { 
            position: absolute; 
            top: 0; left: 0;
            width: 100vw; 
            height: 100vh; 
            z-index: 1; 
            pointer-events: none;
        }

        #orb-visualizer canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        #trigger-zone { position: absolute; inset: 0; z-index: 20; cursor: pointer; }
    </style>
</head>
<body>

    <div class="drevo-watermark">DREVO SYSTEMS</div>
    <div id="orb-visualizer"></div>
    <div id="trigger-zone" onclick="iniciarJarvis()"></div>
    
    <div id="ui-layer">
        <div class="drevo-logo">Sistemas DRevo</div>
        <h1>ESTOQUE <strong>A.I.</strong></h1>
        <p id="status">CLIQUE NA TELA PARA ACORDAR</p>
        <div id="output">Ouvindo em Standby...</div>
    </div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.176.0';
        import { EffectComposer } from 'https://esm.sh/three@0.176.0/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'https://esm.sh/three@0.176.0/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'https://esm.sh/three@0.176.0/addons/postprocessing/UnrealBloomPass.js';

        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8EWJKJd4-7fqYwuCI6xq5tHjGwazGVSszwng8JBqsLeQ_Nu_RZuvseyjASl6KkBAB9Q/exec";

        let currentState = "OFF";
        let pendingData = { item: "", quantity: 1, category: "" };
        let isOrbSimulating = false;
        let ignoreRecognition = false;
        let globalRecognition = null;
        
        let micDataArray = new Uint8Array(32);
        let jarvisAnalyserData = new Uint8Array(32);
        let sphereMesh = null;

        function initBulletproofOrb() {
            const container = document.getElementById('orb-visualizer');
            
            try {
                const scene = new THREE.Scene(); 
                scene.background = new THREE.Color(0x100c14);
                
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000); 
                camera.position.set(2, -2, 5); 
                
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
                renderer.setSize(window.innerWidth, window.innerHeight); 
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                container.appendChild(renderer.domElement);
                
                scene.add(new THREE.AmbientLight(0xffffff, 0.5));
                const dirLight = new THREE.DirectionalLight(0xffffff, 2); 
                dirLight.position.set(5, 5, 5); 
                scene.add(dirLight);

                const sphereVS = `
                #define STANDARD
                varying vec3 vViewPosition; #ifdef USE_TRANSMISSION varying vec3 vWorldPosition; #endif
                #include <common> #include <batching_pars_vertex> #include <uv_pars_vertex> #include <displacementmap_pars_vertex> #include <color_pars_vertex> #include <fog_pars_vertex> #include <normal_pars_vertex> #include <morphtarget_pars_vertex> #include <skinning_pars_vertex> #include <shadowmap_pars_vertex> #include <logdepthbuf_pars_vertex> #include <clipping_planes_pars_vertex>
                uniform float time; uniform vec4 inputData; uniform vec4 outputData;
                vec3 calc( vec3 pos ) { vec3 dir = normalize( pos ); vec3 p = dir + vec3( time, 0., 0. ); return pos + 1. * inputData.x * inputData.y * dir * (.5 + .5 * sin(inputData.z * pos.x + time)) + 1. * outputData.x * outputData.y * dir * (.5 + .5 * sin(outputData.z * pos.y + time)); }
                vec3 spherical( float r, float theta, float phi ) { return r * vec3(cos(theta)*cos(phi), sin(theta)*cos(phi), sin(phi)); }
                void main() {
                  #include <uv_vertex> #include <color_vertex> #include <morphinstance_vertex> #include <morphcolor_vertex> #include <batching_vertex> #include <beginnormal_vertex> #include <morphnormal_vertex> #include <skinbase_vertex> #include <skinnormal_vertex> #include <defaultnormal_vertex> #include <normal_vertex> #include <begin_vertex>
                  float inc = 0.001; float r = length( position ); float theta = ( uv.x + 0.5 ) * 2. * PI; float phi = -( uv.y + 0.5 ) * PI;
                  vec3 np = calc( spherical( r, theta, phi ) );
                  vec3 tangent = normalize( calc( spherical( r, theta + inc, phi ) ) - np ); vec3 bitangent = normalize( calc( spherical( r, theta, phi + inc ) ) - np );
                  transformedNormal = -normalMatrix * normalize( cross( tangent, bitangent ) );
                  vNormal = normalize( transformedNormal ); transformed = np;
                  #include <morphtarget_vertex> #include <skinning_vertex> #include <displacementmap_vertex> #include <project_vertex> #include <logdepthbuf_vertex> #include <clipping_planes_vertex>
                  vViewPosition = - mvPosition.xyz; #include <worldpos_vertex> #include <shadowmap_vertex> #include <fog_vertex> #ifdef USE_TRANSMISSION vWorldPosition = worldPosition.xyz; #endif
                }`;

                const sphereMat = new THREE.MeshStandardMaterial({ color: 0x000010, metalness: 0.8, roughness: 0.2, emissive: 0x00aaff, emissiveIntensity: 0.2 });
                sphereMat.onBeforeCompile = (shader) => { shader.uniforms.time = { value: 0 }; shader.uniforms.inputData = { value: new THREE.Vector4() }; shader.uniforms.outputData = { value: new THREE.Vector4() }; sphereMat.userData.shader = shader; shader.vertexShader = sphereVS; };
                sphereMesh = new THREE.Mesh(new THREE.IcosahedronGeometry(1, 32), sphereMat); 
                scene.add(sphereMesh); 

                const composer = new EffectComposer(renderer); 
                composer.addPass(new RenderPass(scene, camera)); 
                composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.5, 0.5, 0));

                window.addEventListener('resize', () => { 
                    camera.aspect = window.innerWidth / window.innerHeight; 
                    camera.updateProjectionMatrix(); 
                    renderer.setSize(window.innerWidth, window.innerHeight); 
                    composer.setSize(window.innerWidth, window.innerHeight); 
                });

                let prevTime = performance.now();
                let rotationVec = new THREE.Vector3(0, 0, 0);

                function animate() {
                    requestAnimationFrame(animate);

                    const t = performance.now(); 
                    const dt = Math.min((t - prevTime) / (1000 / 60), 2.0); 
                    prevTime = t;

                    // Animação suave constante para parecer "vivo"
                    for(let i=0; i<32; i++) {
                        micDataArray[i] = 15 + Math.sin(t * 0.002 + i * 0.5) * 15;
                    }

                    if (sphereMesh && sphereMesh.material.userData.shader) {
                      const outData = jarvisAnalyserData;
                      const inData = micDataArray;
                      
                      const baseScale = 1 + Math.sin(t * 0.002) * 0.05; 
                      sphereMesh.scale.setScalar(baseScale + (0.3 * outData[1]) / 255 + (0.3 * inData[1]) / 255);
                      
                      const f = 0.001; 
                      rotationVec.x += (dt * f * 0.5 * outData[1]) / 255 + (dt * f * 0.5 * inData[1]) / 255 + 0.002; 
                      rotationVec.z += (dt * f * 0.5 * inData[1]) / 255 + 0.001; 
                      rotationVec.y += (dt * f * 0.25 * inData[2]) / 255 + (dt * f * 0.25 * outData[2]) / 255 + 0.003;
                      
                      const euler = new THREE.Euler(rotationVec.x, rotationVec.y, rotationVec.z);
                      camera.position.copy(new THREE.Vector3(0, 0, 5).applyQuaternion(new THREE.Quaternion().setFromEuler(euler))); 
                      camera.lookAt(sphereMesh.position);
                      
                      sphereMesh.material.userData.shader.uniforms.time.value += (dt * 0.1 * outData[0]) / 255 + (dt * 0.1 * inData[0]) / 255 + 0.01;
                      sphereMesh.material.userData.shader.uniforms.inputData.value.set((1 * inData[0]) / 255, (0.1 * inData[1]) / 255, (10 * inData[2]) / 255, 0);
                      sphereMesh.material.userData.shader.uniforms.outputData.value.set((2 * outData[0]) / 255, (0.1 * outData[1]) / 255, (10 * outData[2]) / 255, 0);
                    }
                    composer.render();
                }
                animate();

            } catch (error) {
                console.error("WebGL 3D Orb failed, using CSS fallback", error);
                container.innerHTML = `<div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:200px; height:200px; background:radial-gradient(circle, #00f2ff 0%, #000010 70%); border-radius:50%; box-shadow:0 0 50px #00aaff; animation: pulse 2s infinite alternate;"></div>
                <style>@keyframes pulse { from { transform: translate(-50%, -50%) scale(1); opacity: 0.8; } to { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } }</style>`;
            }
        }

        // Executar a inicialização da orbe imediatamente
        initBulletproofOrb();

        // ==========================================
        // LÓGICA DO ASSISTENTE
        // ==========================================

        function extractData(spokenText) {
            const wordToNumber = { "um":1, "uma":1, "dois":2, "duas":2, "três":3, "tres":3, "quatro":4, "cinco":5, "seis":6, "sete":7, "oito":8, "nove":9, "dez":10 };
            let textLower = spokenText.toLowerCase();
            let category = ""; 

            if (textLower.includes("no estoque") || textLower.includes("estoque")) category = "Estoque";
            else if (textLower.includes("na produção") || textLower.includes("produção")) category = "Produção";
            else if (textLower.includes("na oficina") || textLower.includes("oficina")) category = "Oficina";
            else if (textLower.includes("vendas") || textLower.includes("venda")) category = "Vendas";

            let cleanText = textLower
                .replace(/jarvis/g, "").replace(/anote/g, "").replace(/adicionar/g, "").replace(/coloque/g, "").replace(/planilha/g, "")
                .replace(/no estoque/g, "").replace(/estoque/g, "").replace(/na produção/g, "").replace(/produção/g, "")
                .replace(/na oficina/g, "").replace(/oficina/g, "").trim();
            
            let words = cleanText.split(' ').filter(w => w !== "");
            let quantity = 1;
            let itemText = cleanText;

            if (words.length > 0) {
                let firstWord = words[0];
                if (!isNaN(parseInt(firstWord))) {
                    quantity = parseInt(firstWord);
                    words.shift(); itemText = words.join(' ');
                } else if (wordToNumber[firstWord]) {
                    quantity = wordToNumber[firstWord];
                    words.shift(); itemText = words.join(' ');
                }
            }
            
            if(category) category = category.charAt(0).toUpperCase() + category.slice(1);
            return { quantity: quantity, item: itemText.trim(), category: category };
        }

        function updateUI(statusText, outputText, color) {
            const statusEl = document.getElementById('status');
            const outputEl = document.getElementById('output');
            statusEl.innerText = statusText;
            statusEl.style.color = color;
            if(outputText !== null) outputEl.innerText = outputText;
        }

        function speakJarvis(text, onEndCallback) {
            window.speechSynthesis.cancel(); // Limpa filas antigas que podem travar o Android

            ignoreRecognition = true;
            isOrbSimulating = true;
            
            if (!window.simuladorOrb) {
                window.simuladorOrb = setInterval(() => {
                    for(let i=0; i<32; i++) jarvisAnalyserData[i] = Math.random() * 255;
                }, 50);
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.pitch = 0.2; 
            utterance.rate = 1.15; 

            const voices = window.speechSynthesis.getVoices();
            const jarvisVoice = voices.find(v => v.name.includes('UK English Male') || v.name.includes('Antonio') || v.name.includes('Male') || v.name.includes('Masculino'));
            if (jarvisVoice) utterance.voice = jarvisVoice;

            // Timeout de segurança: Chrome no Android tem um bug conhecido onde 'onend' nunca é disparado se a voz falhar!
            let durationSafeLimit = Math.max(2000, text.length * 150);
            let safetyReset = setTimeout(() => {
                resetState();
                if(onEndCallback) onEndCallback();
            }, durationSafeLimit);

            function resetState() {
                ignoreRecognition = false;
                isOrbSimulating = false;
                clearInterval(window.simuladorOrb);
                window.simuladorOrb = null;
                jarvisAnalyserData.fill(0);
            }

            utterance.onend = () => {
                clearTimeout(safetyReset);
                resetState();
                if(onEndCallback) onEndCallback();
            };

            utterance.onerror = () => {
                clearTimeout(safetyReset);
                resetState();
                if(onEndCallback) onEndCallback();
            };

            window.speechSynthesis.speak(utterance);
        }

        window.iniciarJarvis = function() {
            if(currentState !== "OFF") return;
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Reconhecimento não suportado no seu navegador."); return; }
            
            globalRecognition = new SpeechRecognition();
            globalRecognition.lang = 'pt-BR';
            globalRecognition.continuous = true; 
            globalRecognition.interimResults = false; 

            currentState = "STANDBY";
            updateUI("SISTEMA DE ESTOQUE ATIVO", "Diga 'Jarvis' e o item", "#00ff66");
            speakJarvis("Sistemas ativados, senhor.");

            globalRecognition.onstart = () => {
                if(currentState === "STANDBY") updateUI("STANDBY", "Ouvindo...", "#00ff66");
            };

            globalRecognition.onresult = (event) => {
                if(ignoreRecognition) return;

                const text = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
                document.getElementById('output').innerText = text;

                if (currentState === "STANDBY") {
                    if (text.includes("jarvis")) {
                        if (text.length < 10) {
                            currentState = "LISTENING_COMMAND";
                            speakJarvis("O que deseja anotar?");
                        } else {
                            processPlanilhaCommand(text);
                        }
                    }
                } 
                else if (currentState === "LISTENING_COMMAND") {
                    processPlanilhaCommand(text);
                } 
                else if (currentState === "ASKING_CATEGORY") {
                    let userCat = text.replace(/jarvis/g, "").trim();
                    pendingData.category = userCat.charAt(0).toUpperCase() + userCat.slice(1);
                    currentState = "CONFIRMING";
                    updateUI("PROCESSANDO...", `Categoria: ${pendingData.category} | Qtd: ${pendingData.quantity} | Item: ${pendingData.item}`, "#00f2ff");
                    speakJarvis(`Anotar ${pendingData.quantity} ${pendingData.item} na categoria ${pendingData.category}?`);
                }
                else if (currentState === "CONFIRMING") {
                    if (text.includes("sim") || text.includes("confirma") || text.includes("ok") || text.includes("pode")) {
                        currentState = "SAVING";
                        updateUI("SALVANDO...", "Enviando para o Google Sheets...", "#00f2ff");
                        speakJarvis("Lançando na planilha.");
                        
                        fetch(SCRIPT_URL, {
                            method: 'POST', mode: 'no-cors',
                            body: JSON.stringify({ item: pendingData.item, quantidade: pendingData.quantity, categoria: pendingData.category })
                        }).then(() => {
                            updateUI("✅ ADICIONADO", `${pendingData.quantity}x ${pendingData.item} (${pendingData.category})`, "#00ff66");
                            speakJarvis("Pronto.", () => { currentState = "STANDBY"; });
                        }).catch((e) => {
                            updateUI("ERRO AO SALVAR", e.message, "#ff0000");
                            speakJarvis("Erro na rede. Tente de novo.");
                            currentState = "STANDBY";
                        });

                    } else if (text.includes("não") || text.includes("cancela")) {
                        updateUI("CANCELADO", "Operação abortada.", "#ffaa00");
                        speakJarvis("Abortado.", () => { currentState = "STANDBY"; });
                    } else {
                        speakJarvis("Confirme com sim ou não.");
                    }
                }
            };

            globalRecognition.onend = () => {
                if (currentState !== "OFF") {
                    try { globalRecognition.start(); } catch(e) {}
                }
            };

            try { globalRecognition.start(); } catch(e) {}
        };

        function processPlanilhaCommand(text) {
            const data = extractData(text);
            if(data.item === "") {
                speakJarvis("Não entendi o item. Repita por favor.");
                currentState = "LISTENING_COMMAND";
                return;
            }
            pendingData = data;
            
            if (data.category === "") {
                currentState = "ASKING_CATEGORY";
                updateUI("FALTA CATEGORIA", `Item: ${data.item} | Qtd: ${data.quantity}`, "#ffaa00");
                speakJarvis(`Em qual categoria, senhor?`);
            } else {
                currentState = "CONFIRMING";
                updateUI("PROCESSANDO...", `Categoria: ${data.category} | Qtd: ${data.quantity} | Item: ${data.item}`, "#00f2ff");
                speakJarvis(`Anotar ${data.quantity} ${data.item} na categoria ${data.category}?`);
            }
        }
    </script>
</body>
</html>
