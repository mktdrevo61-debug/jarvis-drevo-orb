<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>DRevo Jarvis - IA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #030305; 
            color: #00f2ff; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .drevo-watermark {
            position: absolute;
            bottom: 20px;
            right: 25px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 5px;
            color: rgba(255, 170, 0, 0.4);
            text-transform: uppercase;
            z-index: 5;
            pointer-events: none;
        }

        #ui-layer {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(5, 10, 20, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 255, 0.25);
            border-top: 1px solid rgba(0, 242, 255, 0.5);
            border-radius: 24px;
            padding: 35px 40px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6), inset 0 0 20px rgba(0, 242, 255, 0.05);
            width: 85%;
            max-width: 500px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .drevo-logo {
            font-size: 11px;
            letter-spacing: 4px;
            color: #ffaa00;
            text-transform: uppercase;
            margin-bottom: -5px;
            font-weight: 800;
            opacity: 0.9;
        }

        h1 { 
            margin: 5px 0 15px 0; 
            font-size: 26px; 
            letter-spacing: 3px; 
            font-weight: 300; 
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.8); 
        }
        
        h1 strong { font-weight: 700; color: #00f2ff; }

        #status { 
            letter-spacing: 2px; 
            font-weight: 700; 
            font-size: 13px; 
            color: #ffaa00; 
            margin-bottom: 15px; 
            text-transform: uppercase;
        }

        #output { 
            font-size: 18px; 
            color: #e0faff; 
            font-weight: 400; 
            min-height: 25px; 
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        /* =========================================
           NOVA ORBE 3D HOLOGRÁFICA EM CSS PURO
           (100% à prova de falhas em Android)
           ========================================= */
        #orb-visualizer { 
            position: absolute; 
            top: 45%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; 
            height: 300px; 
            z-index: 1; 
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .css-orb {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #00ffff 0%, #0077ff 30%, #000033 80%);
            box-shadow: 
                0 0 50px rgba(0, 242, 255, 0.5),
                inset 0 0 30px rgba(255, 255, 255, 0.6),
                inset -20px -20px 40px rgba(0, 0, 0, 0.9);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out, box-shadow 0.1s ease-out;
        }

        /* Anéis Holográficos */
        .css-orb::before {
            content: '';
            position: absolute;
            top: -15%; left: -15%; right: -15%; bottom: -15%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: rgba(0, 242, 255, 0.9);
            border-bottom-color: rgba(0, 242, 255, 0.4);
            animation: rotateOrb 3s linear infinite;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .css-orb::after {
            content: '';
            position: absolute;
            top: -30%; left: -30%; right: -30%; bottom: -30%;
            border-radius: 50%;
            border: 1px solid transparent;
            border-left-color: rgba(0, 150, 255, 0.6);
            border-right-color: rgba(0, 150, 255, 0.2);
            animation: rotateOrbReverse 6s linear infinite;
        }

        @keyframes rotateOrb {
            0% { transform: rotateZ(0deg) rotateX(65deg) rotateY(0deg); }
            100% { transform: rotateZ(360deg) rotateX(65deg) rotateY(0deg); }
        }
        @keyframes rotateOrbReverse {
            0% { transform: rotateZ(360deg) rotateX(45deg) rotateY(45deg); }
            100% { transform: rotateZ(0deg) rotateX(45deg) rotateY(45deg); }
        }

        #trigger-zone { position: absolute; inset: 0; z-index: 20; cursor: pointer; }
    </style>
</head>
<body>

    <div class="drevo-watermark">DREVO SYSTEMS</div>
    
    <div id="orb-visualizer">
        <div class="css-orb" id="holographic-orb"></div>
    </div>
    
    <div id="trigger-zone" onclick="iniciarJarvis()"></div>
    
    <div id="ui-layer">
        <div class="drevo-logo">Sistemas DRevo</div>
        <h1>ESTOQUE <strong>A.I.</strong></h1>
        <p id="status">CLIQUE NA TELA PARA ACORDAR</p>
        <div id="output">Ouvindo em Standby...</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8EWJKJd4-7fqYwuCI6xq5tHjGwazGVSszwng8JBqsLeQ_Nu_RZuvseyjASl6KkBAB9Q/exec";

        let currentState = "OFF";
        let pendingData = { item: "", quantity: 1, category: "" };
        let isOrbSimulating = false;
        let ignoreRecognition = false;
        let globalRecognition = null;
        let jarvisAnalyserData = new Uint8Array(32);

        // Animação da Orbe CSS (100% de certeza que vai renderizar)
        const orb = document.getElementById('holographic-orb');
        function animateCssOrb() {
            requestAnimationFrame(animateCssOrb);
            let scale = 1;
            let glow = 50;
            
            if (jarvisAnalyserData[0] > 0) {
                // Pulsando quando o Jarvis fala
                let sum = 0;
                for(let i=0; i<jarvisAnalyserData.length; i++) sum += jarvisAnalyserData[i];
                let avg = sum / jarvisAnalyserData.length;
                scale = 1 + (avg / 255) * 0.3;
                glow = 50 + (avg / 255) * 120;
            } else {
                // Respiração suave (Idle)
                const t = performance.now();
                scale = 1 + Math.sin(t * 0.002) * 0.03;
                glow = 50 + Math.sin(t * 0.002) * 15;
            }
            
            if(orb) {
                orb.style.transform = `scale(${scale})`;
                orb.style.boxShadow = `0 0 ${glow}px rgba(0, 242, 255, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.6), inset -20px -20px 40px rgba(0, 0, 0, 0.9)`;
            }
        }
        animateCssOrb();

        function extractData(spokenText) {
            const wordToNumber = { "um":1, "uma":1, "dois":2, "duas":2, "três":3, "tres":3, "quatro":4, "cinco":5, "seis":6, "sete":7, "oito":8, "nove":9, "dez":10 };
            let textLower = spokenText.toLowerCase();
            let category = ""; 

            if (textLower.includes("no estoque") || textLower.includes("estoque")) category = "Estoque";
            else if (textLower.includes("na produção") || textLower.includes("produção")) category = "Produção";
            else if (textLower.includes("na oficina") || textLower.includes("oficina")) category = "Oficina";
            else if (textLower.includes("vendas") || textLower.includes("venda")) category = "Vendas";

            let cleanText = textLower
                .replace(/jarvis/g, "").replace(/anote/g, "").replace(/adicionar/g, "").replace(/coloque/g, "").replace(/planilha/g, "")
                .replace(/no estoque/g, "").replace(/estoque/g, "").replace(/na produção/g, "").replace(/produção/g, "")
                .replace(/na oficina/g, "").replace(/oficina/g, "").trim();
            
            let words = cleanText.split(' ').filter(w => w !== "");
            let quantity = 1;
            let itemText = cleanText;

            if (words.length > 0) {
                let firstWord = words[0];
                if (!isNaN(parseInt(firstWord))) {
                    quantity = parseInt(firstWord);
                    words.shift(); itemText = words.join(' ');
                } else if (wordToNumber[firstWord]) {
                    quantity = wordToNumber[firstWord];
                    words.shift(); itemText = words.join(' ');
                }
            }
            
            if(category) category = category.charAt(0).toUpperCase() + category.slice(1);
            return { quantity: quantity, item: itemText.trim(), category: category };
        }

        function updateUI(statusText, outputText, color) {
            const statusEl = document.getElementById('status');
            const outputEl = document.getElementById('output');
            statusEl.innerText = statusText;
            statusEl.style.color = color;
            if(outputText !== null) outputEl.innerText = outputText;
        }

        function speakJarvis(text, onEndCallback) {
            window.speechSynthesis.cancel();

            ignoreRecognition = true;
            isOrbSimulating = true;
            
            if (!window.simuladorOrb) {
                window.simuladorOrb = setInterval(() => {
                    for(let i=0; i<32; i++) jarvisAnalyserData[i] = Math.random() * 255;
                }, 50);
            }

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'pt-BR';
            utterance.pitch = 0.2; 
            utterance.rate = 1.15; 

            const voices = window.speechSynthesis.getVoices();
            const jarvisVoice = voices.find(v => v.name.includes('UK English Male') || v.name.includes('Antonio') || v.name.includes('Male') || v.name.includes('Masculino'));
            if (jarvisVoice) utterance.voice = jarvisVoice;

            let durationSafeLimit = Math.max(2000, text.length * 150);
            let safetyReset = setTimeout(() => {
                resetState();
                if(onEndCallback) onEndCallback();
            }, durationSafeLimit);

            function resetState() {
                ignoreRecognition = false;
                isOrbSimulating = false;
                clearInterval(window.simuladorOrb);
                window.simuladorOrb = null;
                jarvisAnalyserData.fill(0);
            }

            utterance.onend = () => {
                clearTimeout(safetyReset);
                resetState();
                if(onEndCallback) onEndCallback();
            };

            utterance.onerror = () => {
                clearTimeout(safetyReset);
                resetState();
                if(onEndCallback) onEndCallback();
            };

            window.speechSynthesis.speak(utterance);
        }

        window.iniciarJarvis = function() {
            if(currentState !== "OFF") return;
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) { alert("Reconhecimento não suportado no seu navegador."); return; }
            
            globalRecognition = new SpeechRecognition();
            globalRecognition.lang = 'pt-BR';
            globalRecognition.continuous = true; 
            globalRecognition.interimResults = false; 

            currentState = "STANDBY";
            updateUI("SISTEMA DE ESTOQUE ATIVO", "Diga 'Jarvis' e o item", "#00ff66");
            speakJarvis("Sistemas ativados, senhor.");

            globalRecognition.onstart = () => {
                if(currentState === "STANDBY") updateUI("STANDBY", "Ouvindo...", "#00ff66");
            };

            globalRecognition.onresult = (event) => {
                if(ignoreRecognition) return;

                const text = event.results[event.results.length - 1][0].transcript.trim().toLowerCase();
                document.getElementById('output').innerText = text;

                if (currentState === "STANDBY") {
                    if (text.includes("jarvis")) {
                        if (text.length < 10) {
                            currentState = "LISTENING_COMMAND";
                            speakJarvis("O que deseja anotar?");
                        } else {
                            processPlanilhaCommand(text);
                        }
                    }
                } 
                else if (currentState === "LISTENING_COMMAND") {
                    processPlanilhaCommand(text);
                } 
                else if (currentState === "ASKING_CATEGORY") {
                    let userCat = text.replace(/jarvis/g, "").trim();
                    pendingData.category = userCat.charAt(0).toUpperCase() + userCat.slice(1);
                    currentState = "CONFIRMING";
                    updateUI("PROCESSANDO...", `Categoria: ${pendingData.category} | Qtd: ${pendingData.quantity} | Item: ${pendingData.item}`, "#00f2ff");
                    speakJarvis(`Anotar ${pendingData.quantity} ${pendingData.item} na categoria ${pendingData.category}?`);
                }
                else if (currentState === "CONFIRMING") {
                    if (text.includes("sim") || text.includes("confirma") || text.includes("ok") || text.includes("pode")) {
                        currentState = "SAVING";
                        updateUI("SALVANDO...", "Enviando para o Google Sheets...", "#00f2ff");
                        speakJarvis("Lançando na planilha.");
                        
                        fetch(SCRIPT_URL, {
                            method: 'POST', mode: 'no-cors',
                            body: JSON.stringify({ item: pendingData.item, quantidade: pendingData.quantity, categoria: pendingData.category })
                        }).then(() => {
                            updateUI("✅ ADICIONADO", `${pendingData.quantity}x ${pendingData.item} (${pendingData.category})`, "#00ff66");
                            speakJarvis("Pronto.", () => { currentState = "STANDBY"; });
                        }).catch((e) => {
                            updateUI("ERRO AO SALVAR", e.message, "#ff0000");
                            speakJarvis("Erro na rede. Tente de novo.");
                            currentState = "STANDBY";
                        });

                    } else if (text.includes("não") || text.includes("cancela")) {
                        updateUI("CANCELADO", "Operação abortada.", "#ffaa00");
                        speakJarvis("Abortado.", () => { currentState = "STANDBY"; });
                    } else {
                        speakJarvis("Confirme com sim ou não.");
                    }
                }
            };

            globalRecognition.onend = () => {
                if (currentState !== "OFF") {
                    try { globalRecognition.start(); } catch(e) {}
                }
            };

            try { globalRecognition.start(); } catch(e) {}
        };

        function processPlanilhaCommand(text) {
            const data = extractData(text);
            if(data.item === "") {
                speakJarvis("Não entendi o item. Repita por favor.");
                currentState = "LISTENING_COMMAND";
                return;
            }
            pendingData = data;
            
            if (data.category === "") {
                currentState = "ASKING_CATEGORY";
                updateUI("FALTA CATEGORIA", `Item: ${data.item} | Qtd: ${data.quantity}`, "#ffaa00");
                speakJarvis(`Em qual categoria, senhor?`);
            } else {
                currentState = "CONFIRMING";
                updateUI("PROCESSANDO...", `Categoria: ${data.category} | Qtd: ${data.quantity} | Item: ${data.item}`, "#00f2ff");
                speakJarvis(`Anotar ${data.quantity} ${data.item} na categoria ${data.category}?`);
            }
        }
    </script>
</body>
</html>
